[build]
  # Install pnpm via npm then build
  command = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build"
  
  # Directory with build output
  publish = "build"

[build.environment]
  # Node.js version
  NODE_VERSION = "18.20.4"
  
  # Disable Corepack entirely to avoid signature issues
  COREPACK_ENABLE_STRICT = "0"

# Redirect rules for SPA (catch-all for client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200